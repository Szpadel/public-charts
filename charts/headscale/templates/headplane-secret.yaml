{{- if and .Values.headplane.enabled .Values.headplane.cookieSecret.create (not .Values.headplane.cookieSecret.existingSecret) -}}
{{- include "common.values.setup" . -}}
{{- $secretName := include "headscale.headplaneCookieSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $cookieSecret := randAlphaNum 32 -}}
{{- if and $existing (hasKey $existing.data "cookie_secret") -}}
{{- $cookieSecret = index $existing.data "cookie_secret" | b64dec -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  cookie_secret: {{ $cookieSecret | quote }}
{{- end -}}
